<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotDix — Jeu de lettres</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --border: #2a2f3d;
    --accent: #e8ff47;
    --accent2: #ff6b47;
    --text: #f0f2f5;
    --muted: #5a6075;
    --good: #47ffb2;
    --bad: #ff4769;
    --used: #2a2f3d;
    --used-text: #3d4357;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none; width: 100%; max-width: 700px; padding: 2rem; animation: fadeIn 0.4s ease; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  /* ── TITLE ── */
  .title {
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(232,255,71,0.25);
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  /* ── CHOICE SCREEN ── */
  .choice-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 1.5rem;
  }
  .length-buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .len-btn {
    width: 90px; height: 90px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .len-btn::after {
    content: attr(data-label);
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .len-btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(232,255,71,0.3);
  }
  .len-btn:hover::after { color: rgba(0,0,0,0.5); }

  /* ── GAME SCREEN ── */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 2.5rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }
  .score-block { text-align: center; }
  .score-val {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
  }
  .score-val.danger { color: var(--bad); animation: pulse 0.8s ease infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .score-lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .level-badge {
    background: var(--accent);
    color: var(--bg);
    font-weight: 800;
    font-size: 1.8rem;
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(232,255,71,0.4);
  }

  /* ── WORD DISPLAY ── */
  .word-display {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .letter-slot {
    width: 44px; height: 54px;
    border-bottom: 3px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--accent);
    transition: all 0.3s;
    position: relative;
  }
  .letter-slot.revealed {
    border-color: var(--accent);
    animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  /* ── KEYBOARD ── */
  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    width: 100%;
    max-width: 540px;
  }
  .kb-row {
    display: flex;
    justify-content: center;
    gap: 0.35rem;
  }
  .kb-key {
    width: 44px; height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .kb-key:hover:not(.used) {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    transform: scale(1.1);
  }
  .kb-key.good {
    background: var(--good);
    color: var(--bg);
    border-color: var(--good);
    box-shadow: 0 0 12px rgba(71,255,178,0.3);
  }
  .kb-key.bad {
    background: var(--used);
    border-color: var(--used);
    color: var(--used-text);
    cursor: default;
    transform: none !important;
  }

  /* ── MESSAGES ── */
  .message-bar {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    margin-bottom: 1.5rem;
    transition: all 0.3s;
  }
  .message-bar.win { color: var(--good); }
  .message-bar.lose { color: var(--bad); }
  .message-bar.info { color: var(--muted); }

  /* ── DEF BUTTON ── */
  .def-btn-wrap {
    margin-bottom: 1.2rem;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .def-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 1.1rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .def-btn.visible { display: inline-block; }
  .def-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.05);
  }

  /* ── GAME OVER ── */
  #screen-gameover .title { font-size: clamp(2rem,8vw,4rem); color: var(--bad); }
  .final-score { font-size: 5rem; font-weight: 800; color: var(--accent); line-height: 1; margin: 1rem 0; }
  .final-level { font-family: 'IBM Plex Mono', monospace; color: var(--muted); font-size: 0.9rem; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
  .restart-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 1rem 2.5rem;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,255,71,0.35); }

  /* ── LOADING ── */
  .loading {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    animation: blink 1s ease infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── WORD LENGTH INDICATOR ── */
  .word-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    padding: 2rem;
    animation: fadeIn 0.25s ease;
    position: relative;
  }
  .modal-word {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 0.8rem;
  }
  .modal-def {
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.6;
    opacity: 0.85;
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-no-def {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.5rem;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- SCREEN: CHOICE -->
<div id="screen-choice" class="screen active">
  <div class="title">MOTDIX</div>
  <div class="subtitle">jeu de lettres</div>
  <div class="choice-label">Choisissez la longueur du mot</div>
  <div class="length-buttons">
    <button class="len-btn" data-len="7" data-label="lettres" onclick="startGame(7)">7</button>
    <button class="len-btn" data-len="8" data-label="lettres" onclick="startGame(8)">8</button>
    <button class="len-btn" data-len="9" data-label="lettres" onclick="startGame(9)">9</button>
    <button class="len-btn" data-len="10" data-label="lettres" onclick="startGame(10)">10</button>
  </div>
</div>

<!-- SCREEN: LOADING -->
<div id="screen-loading" class="screen">
  <div class="loading">Chargement du dictionnaire…</div>
</div>

<!-- SCREEN: GAME -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="score-block">
      <div class="score-val" id="score-display">10</div>
      <div class="score-lbl">points</div>
    </div>
    <div class="level-badge" id="level-display">1</div>
    <div class="score-block">
      <div class="score-val" id="wordlen-display" style="color:var(--muted)">7</div>
      <div class="score-lbl">lettres</div>
    </div>
  </div>

  <div class="message-bar info" id="message-bar">Bonne chance !</div>

  <div class="word-display" id="word-display"></div>
  <div class="word-info" id="word-info"></div>

  <div class="def-btn-wrap">
    <button class="def-btn" id="def-btn-game" onclick="showDefinition()">📖 Définition</button>
  </div>

  <div class="keyboard" id="keyboard"></div>
</div>

<!-- SCREEN: GAME OVER -->
<div id="screen-gameover" class="screen">
  <div class="title">GAME OVER</div>
  <div class="final-score" id="go-score">0</div>
  <div class="final-level" id="go-level">Niveau atteint : 1</div>
  <div class="def-btn-wrap" style="margin-bottom:1.5rem">
    <button class="def-btn visible" id="def-btn-gameover" onclick="showDefinition()">📖 Définition du dernier mot</button>
  </div>
  <button class="restart-btn" onclick="showChoice()">↩ Rejouer</button>
</div>

<!-- MODAL: DEFINITION -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-word" id="modal-word"></div>
    <div class="modal-def" id="modal-def"></div>
  </div>
</div>

<script>
// ── STATE ──
let dictionaries = {};   // cache { 7: { words: [], defs: {} }, ... }
let state = {
  score: 10,
  levelIdx: 0,
  wordLen: 7,
  word: '',
  guessed: new Set(),
  revealed: new Set(),
  gameActive: false
};

// ── SCREEN HELPERS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showChoice() { showScreen('screen-choice'); }

// ── LOAD DICTIONARY WITH DEFINITIONS ──
async function loadDict(len) {
  if (dictionaries[len]) return dictionaries[len];
  const filename = `ODS${len}lettres.txt`;
  const resp = await fetch(filename);
  if (!resp.ok) throw new Error(`Impossible de charger ${filename}`);
  const text = await resp.text();
  const words = [];
  const defs = {};
  text.split('\n').forEach(line => {
    const tab = line.indexOf('\t');
    let word, def;
    if (tab !== -1) {
      word = line.slice(0, tab).trim().toUpperCase();
      def  = line.slice(tab + 1).trim();
    } else {
      // fallback: first token only (no definition)
      word = line.trim().toUpperCase();
      def  = '';
    }
    if (word.length === len) {
      words.push(word);
      defs[word] = def;
    }
  });
  dictionaries[len] = { words, defs };
  return dictionaries[len];
}

// ── DEFINITION HELPERS ──
function getDefinition(word) {
  const cache = dictionaries[state.wordLen];
  if (!cache) return '';
  return cache.defs[word] || '';
}

function showDefinition() {
  const word = state.word;
  const def = getDefinition(word);
  document.getElementById('modal-word').textContent = word;
  if (def) {
    document.getElementById('modal-def').innerHTML =
      `<span>${def}</span>`;
  } else {
    document.getElementById('modal-def').innerHTML =
      `<span class="modal-no-def">Définition non disponible.</span>`;
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.tagName === 'BUTTON') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

// ── DEF BUTTON VISIBILITY ──
function showDefBtn() {
  document.getElementById('def-btn-game').classList.add('visible');
}
function hideDefBtn() {
  document.getElementById('def-btn-game').classList.remove('visible');
}

// ── START GAME ──
async function startGame(len) {
  showScreen('screen-loading');
  state.score = 10;
  state.levelIdx = 0;
  state.wordLen = len;
  try {
    await loadDict(len);
    pickNewWord();
  } catch(e) {
    alert('Erreur : ' + e.message);
    showChoice();
  }
}

function pickNewWord() {
  const { words } = dictionaries[state.wordLen];
  state.word = words[Math.floor(Math.random() * words.length)];
  state.guessed = new Set();
  state.revealed = new Set();
  state.gameActive = true;
  hideDefBtn();
  renderGame();
  showScreen('screen-game');
}

// ── RENDER ──
function renderGame() {
  // Header
  const scoreEl = document.getElementById('score-display');
  scoreEl.textContent = state.score;
  scoreEl.className = 'score-val' + (state.score <= 3 ? ' danger' : '');
  document.getElementById('level-display').textContent = state.levelIdx + 1;
  document.getElementById('wordlen-display').textContent = state.wordLen;

  // Word slots
  const wd = document.getElementById('word-display');
  wd.innerHTML = '';
  for (let i = 0; i < state.word.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    slot.id = `slot-${i}`;
    if (state.revealed.has(state.word[i])) {
      slot.textContent = state.word[i];
      slot.classList.add('revealed');
    }
    wd.appendChild(slot);
  }

  // Word info
  document.getElementById('word-info').textContent =
    `${state.word.length} lettres · ${[...state.revealed].length} trouvée(s)`;

  // Keyboard
  renderKeyboard();
}

function renderKeyboard() {
  const rows = ['AZERTYUIOP', 'QSDFGHJKLM', 'WXCVBN'];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  rows.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    [...row].forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'kb-key';
      btn.textContent = letter;
      btn.id = `key-${letter}`;
      if (state.guessed.has(letter)) {
        btn.classList.add(state.word.includes(letter) ? 'good' : 'bad');
        btn.onclick = null;
      } else {
        btn.onclick = () => guess(letter);
      }
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

// ── GUESS ──
function guess(letter) {
  if (!state.gameActive) return;
  if (state.guessed.has(letter)) return;

  state.guessed.add(letter);

  const msg = document.getElementById('message-bar');

  if (state.word.includes(letter)) {
    state.revealed.add(letter);
    // Animate revealed slots
    for (let i = 0; i < state.word.length; i++) {
      if (state.word[i] === letter) {
        const slot = document.getElementById(`slot-${i}`);
        if (slot) {
          slot.textContent = letter;
          slot.classList.add('revealed');
        }
      }
    }
    msg.className = 'message-bar win';
    msg.textContent = `✓ "${letter}" est dans le mot !`;

    // Check win: all letters revealed
    const allRevealed = [...state.word].every(l => state.revealed.has(l));
    if (allRevealed) {
      state.gameActive = false;
      state.score += 4;
      state.levelIdx += 1;
      document.getElementById('score-display').textContent = state.score;
      document.getElementById('level-display').textContent = state.levelIdx + 1;
      msg.className = 'message-bar win';
      msg.textContent = `🎉 Bravo ! +4 points — Niveau ${state.levelIdx + 1}`;
      showDefBtn();
      setTimeout(() => {
        if (state.score <= 0) {
          endGame();
        } else {
          pickNewWord();
        }
      }, 2500);
      return;
    }
  } else {
    state.score -= 1;
    document.getElementById('score-display').textContent = state.score;
    const scoreEl = document.getElementById('score-display');
    scoreEl.className = 'score-val' + (state.score <= 3 ? ' danger' : '');
    msg.className = 'message-bar lose';
    msg.textContent = `✗ "${letter}" n'est pas dans le mot. −1 point`;

    if (state.score <= 0) {
      state.gameActive = false;
      // Reveal word
      for (let i = 0; i < state.word.length; i++) {
        const slot = document.getElementById(`slot-${i}`);
        if (slot) { slot.textContent = state.word[i]; slot.classList.add('revealed'); }
      }
      msg.className = 'message-bar lose';
      msg.textContent = `Le mot était : ${state.word}`;
      showDefBtn();
      setTimeout(endGame, 3000);
      renderKeyboard();
      return;
    }
  }

  renderKeyboard();
  document.getElementById('word-info').textContent =
    `${state.word.length} lettres · ${[...state.revealed].length} trouvée(s)`;
}

// ── END GAME ──
function endGame() {
  document.getElementById('go-score').textContent = state.score;
  document.getElementById('go-level').textContent =
    `Niveau atteint : ${state.levelIdx + 1}`;
  showScreen('screen-gameover');
}
</script>
</body>
</html>
